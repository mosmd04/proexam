version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: proexam_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: proexam_db
    ports:
      - "15432:5432"
    volumes:
      - proexam_fresh_data_v2:/var/lib/postgresql/data

volumes:
  proexam_fresh_data_v2:
